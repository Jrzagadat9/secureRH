version: '3.8'

services:
  # PostgreSQL - Base de données principale
  postgres:
    image: postgres:15-alpine
    container_name: securerh-postgres
    environment:
      POSTGRES_USER: securerh
      POSTGRES_PASSWORD: securerh_password_change_in_production
      POSTGRES_DB: securerh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securerh"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securerh-network

  # Redis - Cache et sessions
  redis:
    image: redis:7-alpine
    container_name: securerh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securerh-network

  # n8n - Automatisation de workflows
  n8n:
    image: n8nio/n8n:latest
    container_name: securerh-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin_change_in_production
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Paris
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - securerh-network

  # MinIO - Object Storage (alternative à S3)
  minio:
    image: minio/minio:latest
    container_name: securerh-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_change_in_production
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - securerh-network

  # Elasticsearch - Logs et recherche (Optionnel - pour V1)
  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  #   container_name: securerh-elasticsearch
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #     - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - elasticsearch_data:/usr/share/elasticsearch/data
  #   networks:
  #     - securerh-network

  # OWASP ZAP - Scanner de vulnérabilités (Optionnel - pour développement)
  # owasp-zap:
  #   image: owasp/zap2docker-stable:latest
  #   container_name: securerh-zap
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - securerh-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
  minio_data:
    driver: local
  # elasticsearch_data:
  #   driver: local

networks:
  securerh-network:
    driver: bridge

